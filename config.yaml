api:
  base_url: "https://internal.company.com"
  verify_ssl: false
  asofdate_format: "%d-%b-%Y"
  asofdate_uppercase: true
  auth:
    path: "/auth/token"
    method: "GET"
    client_id: "your-client-id"
    secret: "your-secret"
    client_id_param: "client_id"
    secret_header: "X-API-SECRET"
    debug_log_token: false
  data:
    method: "GET"
    path_template: "/data/table={table_name}/asofdate={asofdate}"
    response_format: "csv"
    file_extension: "csv"
    csv_delimiter: "|"
    accept_header: "text/csv"
  control:
    enabled: false
    method: "GET"
    path_template: "/data/table={table_name}?asofdate={asofdate}"
    response_format: "json"
    accept_header: "application/json"
    file_extension: "json"
    save_response: false
    validation_enabled: true
    payload_path: ""
    count_field: "totalRecordCount"
    date_field: "lastUpdateTime"
    selection_strategy: "latest"
    text_count_pattern: ""
    text_date_pattern: ""
    strict: true
    exclude_header: true
token:
  field: "token"
  expiry_field: "expiringAt"
  header: "Authorization"
  prefix: "Bearer"
  refresh_buffer_minutes: 5
retry:
  max_retries: 3
  backoff_seconds: 2.0
  retryable_status_codes: [429, 500, 502, 503, 504]
orchestrator:
  download_dir: "./downloads"
  log_dir: "./logs"
  metrics_dir: "./metrics"
  cleanup_local_files: true
  fail_fast: false
hdfs:
  enabled: true
  target_dir: "/data/raw/internal_api"
control_file:
  enabled: false
  extension: "ctrl"
  business_date_source: "asofdate"
  business_date_format: "%Y%m%d"
  business_date_format_label: "yyyyMMdd"
  default_time_zone: "CST"
tables:
  - customers
  - orders
